# --------------------------------------
# Hexo Fluid Theme Configuration
# Docs: https://hexo.fluid-dev.com/docs/
# --------------------------------------

# -------------------------------
# Header / Navigation Bar
# -------------------------------
navbar:
  blog_title: TokenEpoch
  menu:
    - { key: "home", link: "/", icon: "fas fa-home" }
    - { key: "archives", link: "/archives/", icon: "fas fa-archive" }
    - { key: "categories", link: "/categories/", icon: "fas fa-folder" }
    - { key: "tags", link: "/tags/", icon: "fas fa-tags" }
    - { key: "about", link: "/about/", icon: "fas fa-user" }

# -------------------------------
# Home Page Banner
# -------------------------------
banner:
  enable: true
  height: 500
  subtitle:
    enable: true
    text:
      - "Welcome to TokenEpoch"
      - "Stay Hungry, Stay Foolish"
    typingSpeed: 100
    backSpeed: 50
    loop: true

# -------------------------------
# Home Page Display
# -------------------------------
index:
  post_abstract:
    enable: true
    priority: 0
  post_meta:
    date: true
    category: true
    tag: true
    word_count: true
    view: false
    comment: true
  post_url_target: _self

# -------------------------------
# Post Page
# -------------------------------
post:
  default_index_img: /img/default.png
  meta:
    author:
      enable: true
    date:
      enable: true
      format: "YYYY-MM-DD"
    word_count:
      enable: true
      format: "{} words"
    min2read:
      enable: true
      format: "{} min"
    views:
      enable: false
    copyright:
      enable: false
  comments:
    enable: true
    type: artalk
  prev_next:
    enable: true
  image_caption:
    enable: true
  anchor:
    enable: true

# -------------------------------
# Artalk Comment System
# Self-hosted comment system
# See: https://artalk.js.org
# -------------------------------
artalk:
  # Your Artalk server URL (required)
  server: 'http://localhost:4000'
  # Site name (leave empty to use backend config)
  site: ''
  # Enable dark mode: false | 'auto' | true
  darkMode: auto
  # Use backend configuration
  useBackendConf: true
  # Show PV count
  pvCount: false
  # Show comment count
  commentCount: true

# -------------------------------
# Footer
# -------------------------------
footer:
  content: |
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a>
    <i class="fas fa-heart" style="color: #e25555"></i>
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>
  since: 2024
  statistics:
    enable: false

# -------------------------------
# Code Highlighting
# -------------------------------
code:
  highlight_theme: github
  line_number: true
  copy_button:
    enable: true

# -------------------------------
# Local Search
# -------------------------------
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: false

# -------------------------------
# Table of Contents (TOC)
# -------------------------------
toc:
  enable: true
  headingSelector: "h2, h3, h4, h5, h6"
  collapseDepth: 0

# -------------------------------
# Web Analytics (disabled by default)
# -------------------------------
web_analytics:
  enable: false

# -------------------------------
# Favicon
# -------------------------------
favicon: /img/favicon.png

# -------------------------------
# Apple Touch Icon
# -------------------------------
apple_touch_icon: /img/apple-touch-icon.png

# -------------------------------
# Lazy Loading
# -------------------------------
lazyload:
  enable: true
  loading_img: /img/loading.gif

# -------------------------------
# Custom CSS/JS
# -------------------------------
custom_css:
custom_js:
custom_head: ''

# -------------------------------
# Page Loader
# -------------------------------
page_loader:
  enable: false

# -------------------------------
# Dark Mode
# -------------------------------
dark_mode:
  enable: true
  default: auto

# -------------------------------
# Links page
# -------------------------------
links:
  enable: false
